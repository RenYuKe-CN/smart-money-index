version: "3.8"
services:
  backend:
    build: ./backend
    ports: ["8002:8002"]
    volumes: [backend_data:/app/app/data]
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"], interval: 30s, timeout: 5s, retries: 3 }
  frontend:
    build: ./frontend
    ports: ["3002:3002"]
    environment: [NEXT_PUBLIC_API_URL=http://localhost:8002]
    depends_on: [backend]
volumes: { backend_data: }
